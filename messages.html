<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#05070d">
  <title>留言反馈 · 冒泡维C AI Lab</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon-32x32.png" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/#home" aria-label="冒泡维C 首页">
      <span class="brand-mark">C</span>
      <span>冒泡维C</span>
    </a>
    <button class="menu-button" type="button" aria-label="打开导航" aria-expanded="false">
      <span></span>
      <span></span>
    </button>
    <nav class="nav-links" aria-label="主导航">
      <a href="/#home">首页</a>
      <a href="/#projects">项目</a>
      <a href="/products.html">商品</a>
      <a href="/messages.html">留言</a>
      <a href="/login.html">登录</a>
    </nav>
  </header>

  <main class="page-main">
    <section class="section page-hero split-hero">
      <div>
        <p class="eyebrow">Feedback</p>
        <h1>留言反馈</h1>
        <p>用于后续接入数据库和消息管理。当前会调用演示 API，但尚未接入真实数据库。</p>
      </div>
      <form class="demo-form" data-message-api-form data-demo-message="留言接口已接收，当前为演示提交">
        <label>
          <span>昵称</span>
          <input type="text" name="nickname" placeholder="你的昵称" required>
        </label>
        <label>
          <span>邮箱</span>
          <input type="email" name="email" placeholder="name@example.com" required>
        </label>
        <label>
          <span>留言内容</span>
          <textarea name="message" rows="5" placeholder="写下你的想法或反馈" required></textarea>
        </label>
        <button class="button primary" type="submit">提交留言</button>
        <p class="demo-notice" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> maopaoweic.top</p>
    <p>留言系统正在开发中</p>
  </footer>
  <script src="/script.js"></script>
</body>
</html>
