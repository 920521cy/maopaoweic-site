<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="冒泡维C AI Lab 订单查询页。查询人工收款订单状态，不显示真实卡密。">
  <meta name="theme-color" content="#05070d">
  <title>订单查询 · 冒泡维C AI Lab</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon-32x32.png" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/#home" aria-label="冒泡维C 首页">
      <span class="brand-mark">C</span>
      <span>冒泡维C</span>
    </a>
    <button class="menu-button" type="button" aria-label="打开导航" aria-expanded="false">
      <span></span>
      <span></span>
    </button>
    <nav class="nav-links" aria-label="主导航">
      <a href="/#home">首页</a>
      <a href="/#projects">项目</a>
      <a href="/products.html">商品</a>
      <a href="/order.html">订单</a>
      <a href="/login.html">登录</a>
    </nav>
  </header>

  <main class="page-main">
    <section class="section page-hero">
      <p class="eyebrow">Order Lookup</p>
      <h1>订单查询</h1>
      <p>当前为人工收款订单流程。订单、付款确认、预留和发货均需后台人工处理；页面不会显示真实卡密或完整用户邮箱。</p>
    </section>

    <section class="section order-lookup-section" data-order-lookup>
      <article class="order-lookup-card">
        <form class="demo-form order-lookup-form" data-order-lookup-form>
          <label>
            <span>订单号</span>
            <input type="text" name="orderId" placeholder="例如 LAB-20260624-ABC123" autocomplete="off">
          </label>
          <button class="button primary" type="submit">查询订单</button>
        </form>
        <div class="order-lookup-result" data-order-lookup-result>
          <p>请输入订单号进行查询。不会显示真实卡密或完整用户邮箱。</p>
        </div>
      </article>
    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> maopaoweic.top</p>
    <p>订单查询仅展示人工收款流程状态，不显示真实卡密。</p>
  </footer>
  <script src="/site-data.js"></script>
  <script src="/script.js"></script>
</body>
</html>
