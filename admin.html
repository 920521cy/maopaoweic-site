<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="description" content="冒泡维C AI Lab 后台管理中心静态演示页。">
  <meta name="theme-color" content="#05070d">
  <title>后台管理中心 · 冒泡维C AI Lab</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon-32x32.png" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/#home" aria-label="冒泡维C 首页">
      <span class="brand-mark">C</span>
      <span>冒泡维C</span>
    </a>
    <button class="menu-button" type="button" aria-label="打开导航" aria-expanded="false">
      <span></span>
      <span></span>
    </button>
    <nav class="nav-links" aria-label="主导航">
      <a href="/#home">首页</a>
      <a href="/#projects">项目</a>
      <a href="/products.html">商品</a>
      <a href="/order.html">订单</a>
      <a href="/login.html">登录</a>
    </nav>
  </header>

  <main class="page-main">
    <section class="section page-hero">
      <p class="eyebrow">Admin Demo</p>
      <h1>后台管理中心</h1>
      <p>商品、订单、卡密与系统状态管理演示</p>
      <div class="admin-hero-notice">
        当前为静态演示界面，尚未接入真实数据库
      </div>
    </section>

    <section class="section admin-access-panel" aria-labelledby="admin-access-title">
      <div>
        <p class="eyebrow">Admin Access</p>
        <h2 id="admin-access-title">管理员访问</h2>
        <p>当前为演示后台，管理 API 需要访问口令。</p>
      </div>
      <form class="admin-access-form" data-admin-access-form>
        <label for="admin-access-key">访问口令</label>
        <input id="admin-access-key" name="adminKey" type="password" placeholder="输入管理员访问口令" autocomplete="off" data-admin-key-input>
        <div class="admin-access-actions">
          <button class="button primary compact-button" type="submit">保存访问口令</button>
          <button class="button secondary compact-button" type="button" data-clear-admin-key>清除访问口令</button>
        </div>
      </form>
    </section>

    <section class="section admin-console" data-admin-demo>
      <article class="info-card">
        <span class="status-pill">加载中</span>
        <h2>后台演示数据加载中</h2>
        <p>如果长时间未显示，请检查浏览器是否正常加载 site-data.js 和 script.js。</p>
      </article>
    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> maopaoweic.top</p>
    <p>后台入口当前仅用于静态演示</p>
  </footer>
  <script src="/site-data.js"></script>
  <script src="/script.js"></script>
</body>
</html>
