<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Random Mouse Canvas</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #17191d;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 219, 77, 0.12), transparent 28%),
        radial-gradient(circle at 82% 25%, rgba(98, 210, 255, 0.10), transparent 30%),
        #17191d;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script src="random-canvas.js"></script>
</body>
</html>
